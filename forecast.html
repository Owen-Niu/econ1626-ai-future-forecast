<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Australia 2030 — Interactive Forecast</title>
  <meta name="description" content="How artificial intelligence will reshape Australia's economy by 2030. An interactive web essay with data-driven visualizations and policy scenarios." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px; line-height: 1.6; letter-spacing: 0.01em;
      color: #0A0A0A; background: #FAFAF5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, h5, h6 { word-break: keep-all; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    :focus-visible { outline: 2px solid #D4A017; outline-offset: 2px; }

    /* Typography */
    .font-display { font-family: 'Instrument Serif', Georgia, serif; }
    .label-style { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
    .section-padding { padding: 120px 48px; }
    .content-max { max-width: 1200px; margin: 0 auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #FAFAF5; }
    ::-webkit-scrollbar-thumb { background: #D4A017; border-radius: 4px; }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(250, 250, 245, 0.92); backdrop-filter: blur(12px);
      height: 64px;
    }
    nav .nav-inner { max-width: 1200px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .nav-logo { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.15em; color: #0A0A0A; cursor: pointer; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #525252; transition: color 0.2s; }
    .nav-links a:hover { color: #0A0A0A; }
    .mobile-menu-btn { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .mobile-menu-btn span { display: block; width: 20px; height: 2px; background: #0A0A0A; transition: all 0.3s; }
  </style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav>
    <div class="nav-inner">
      <span class="nav-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">AI AUSTRALIA 2030</span>
      <div class="nav-links">
        <a href="#thesis">Thesis</a>
        <a href="#channels">Channels</a>
        <a href="#scenarios">Scenarios</a>
        <a href="#policy">Policy</a>
        <a href="#data">Data</a>
      </div>
      <button class="mobile-menu-btn" onclick="document.querySelector('.mobile-drawer').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>


  <!-- ===== JAVASCRIPT ===== -->
  <script>
  </script>
</body>
</html>
